services:
  - type: web
    name: bkln-tech-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn bkln_tech.wsgi --log-file -
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "0.0.0.0"
# Note: set SECRET_KEY and DATABASE_URL as secrets in the Render dashboard
