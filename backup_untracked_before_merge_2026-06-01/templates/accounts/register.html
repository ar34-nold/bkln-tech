{% extends "base.html" %}
{% block content %}
<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
      <div class="form-panel register-panel">
        <p class="text-warning fw-semibold mb-1">BKLN-TECH</p>
        <h1 class="h3 mb-3">Creer un compte</h1>
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
              {{ field }}
              {% for error in field.errors %}<div class="text-danger small mt-1">{{ error }}</div>{% endfor %}
            </div>
          {% endfor %}
          <button class="btn btn-warning w-100">Creer le compte</button>
        </form>
        <a class="btn btn-outline-primary w-100 mt-3" href="https://wa.me/23670039269?text=Bonjour%20BKLN-TECH%2C%20je%20veux%20des%20informations." target="_blank" rel="noopener">Informations sur WhatsApp</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
