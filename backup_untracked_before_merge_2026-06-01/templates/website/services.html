{% extends "base.html" %}
{% block content %}
<section class="container py-5">
  <div class="section-head"><h1>Nos services</h1><span>Chaque module dispose de son espace dedie</span></div>
  <div class="feature-image-grid mb-5">
    {% for feature in features %}
      <a class="feature-image-card" href="{% url feature.url_name %}">
        <img src="{{ feature.image }}" alt="{{ feature.title }}">
        <div><h2>{{ feature.title }}</h2><p>{{ feature.description }}</p></div>
      </a>
    {% endfor %}
  </div>
  <div class="row g-3">{% for service in services %}<div class="col-md-4"><div class="module-card"><h2>{{ service.title }}</h2><p>{{ service.summary }}</p></div></div>{% endfor %}</div>
</section>
{% endblock %}
