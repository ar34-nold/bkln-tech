{% extends "base.html" %}
{% block content %}<section class="container py-5"><h1>Demande de devis</h1><form method="post" class="form-panel">{% csrf_token %}<input class="form-control mb-3" name="name" placeholder="Nom"><input class="form-control mb-3" name="email" type="email" placeholder="Email"><input class="form-control mb-3" name="phone" placeholder="Telephone"><input class="form-control mb-3" name="service" placeholder="Service souhaite"><input class="form-control mb-3" name="budget" type="number" step="0.01" placeholder="Budget indicatif"><textarea class="form-control mb-3" name="details" rows="5" placeholder="Details du projet"></textarea><button class="btn btn-warning">Soumettre</button></form></section>{% endblock %}
