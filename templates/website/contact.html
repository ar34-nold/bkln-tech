{% extends "base.html" %}
{% block content %}<section class="container py-5"><h1>Contact</h1><div class="row g-4"><div class="col-lg-6"><form method="post" class="form-panel">{% csrf_token %}<input class="form-control mb-3" name="name" placeholder="Nom"><input class="form-control mb-3" name="email" type="email" placeholder="Email"><input class="form-control mb-3" name="phone" placeholder="Telephone"><input class="form-control mb-3" name="subject" placeholder="Sujet"><textarea class="form-control mb-3" name="message" rows="5" placeholder="Message"></textarea><button class="btn btn-warning">Envoyer</button></form></div><div class="col-lg-6"><div class="map-box">Google Maps - Bangui, Republique Centrafricaine</div></div></div></section>{% endblock %}
