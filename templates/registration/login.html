{% extends "base.html" %}

{% block title %}Connexion - BKLN-TECH{% endblock %}

{% block content %}
<div class="login-shell">
  <div class="login-panel">
    <h1>BKLN-TECH SOLUTIONS</h1>
    <p class="text-muted">Connexion securisee a la plateforme de gestion.</p>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary w-100" type="submit">Se connecter</button>
    </form>
  </div>
</div>
{% endblock %}
