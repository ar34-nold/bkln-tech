{% extends "base.html" %}
{% block content %}<section class="container py-5"><div class="section-head"><h1>Location de materiels</h1><a class="btn btn-warning" href="{% url 'reserve_item' %}">Reserver</a></div><div class="row g-3">{% for item in items %}<div class="col-md-4"><div class="module-card"><h2>{{ item.name }}</h2><p>{{ item.description }}</p><strong>{{ item.daily_price }} FCFA / jour</strong><p>Caution : {{ item.deposit }} FCFA</p></div></div>{% empty %}<div class="col"><div class="module-card">Aucun materiel disponible.</div></div>{% endfor %}</div></section>{% endblock %}
