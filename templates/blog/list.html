{% extends "base.html" %}
{% block content %}<section class="container py-5"><h1>Blog et actualites</h1><form class="mb-4"><input class="form-control" name="q" value="{{ query }}" placeholder="Rechercher un article"></form><div class="row g-3">{% for article in articles %}<div class="col-md-6 col-xl-4"><article class="module-card"><h2>{{ article.title }}</h2><p>{{ article.excerpt }}</p><a href="{% url 'article_detail' article.slug %}">Lire</a></article></div>{% empty %}<div class="col"><div class="module-card">Aucun article publie.</div></div>{% endfor %}</div></section>{% endblock %}
