{% extends "base.html" %}
{% block content %}<section class="container py-5"><h1>{{ lesson.title }}</h1>{% if lesson.video_url %}<div class="ratio ratio-16x9 mb-3"><iframe src="{{ lesson.video_url }}" allowfullscreen></iframe></div>{% endif %}<div class="content-page">{{ lesson.content|linebreaks }}</div>{% if lesson.pdf %}<a class="btn btn-outline-primary" href="{{ lesson.pdf.url }}">Telecharger le PDF</a>{% endif %}</section>{% endblock %}
