services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    depends_on:
      - db
      - redis
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bkln_tech
      POSTGRES_USER: bkln_tech
      POSTGRES_PASSWORD: bkln_tech
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
